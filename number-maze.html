    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ec4899">
    <title>数字迷宫 - 从1走到N</title>
    <style>
        :root {
            --primary: #ec4899;
            --primary-dark: #db2777;
            --primary-light: #fbcfe8;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --bg-dark: #1e1b4b;
            --bg-card: #312e81;
            --text-primary: #ffffff;
            --text-secondary: #e9d5ff;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4c1d95 0%, #7c3aed 30%, #ec4899 70%, #f472b6 100%);
            background-attachment: fixed;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            color: var(--text-primary);
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.4) 0%, transparent 60%);
            animation: float 8s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.3) 0%, transparent 50%);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }

        .header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            padding-right: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(236, 72, 153, 0.2);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #db2777 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .level-badge {
            padding: 6px 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.4);
        }

        .stats-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 16px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-transform: uppercase;

        .stat-value {

        .game-area {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 16px;
            position: relative;
            z-index: 10;

        .grid-container {

            padding: 12px;
            border-radius: 20px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 60px rgba(236, 72, 153, 0.3);
            position: relative;
        }

        .grid-container::before {

            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;

            border-radius: 22px;
            z-index: -1;

        .game-grid {
            display: grid;
            gap: 4px;
            background: #e5e7eb;
            border-radius: 12px;
            padding: 4px;

        .cell {
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            aspect-ratio: 1;
            min-width: 50px;
            min-height: 50px;
        }

        .cell:active {
            transform: scale(0.92);

        .cell.fixed {
            background: linear-gradient(145deg, #ddd6fe 0%, #c4b5fd 100%);
            color: #5b21b6;
            border: 2px solid #8b5cf6;

        .cell.path {

        .cell.current {

            border: 3px solid #f59e0b !important;

            animation: pulse 1s ease-in-out infinite;

        .cell.next-hint {

            border: 2px solid #10b981;
            animation: hintPulse 1.5s ease-in-out infinite;

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes hintPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }

            position: fixed;

            padding: 16px 28px;

        .victory-modal {

        .hint-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;

        .game-nav {

    <script>
        let gridSize = 5;
        let maxNumber = 20;
        let currentNumber = 1;
        let path = []; // 已走过的路径
        let fixedNumbers = {}; // 关键数字位置 {index: number}
        let selectedLevel = 20;
        let stepCount = 0;
        let hintCell = null;

        function init() {
            createGrid();
            generatePuzzle();
            renderGrid();
            updateStats();
        }

        function createGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => onCellClick(i));
                gridEl.appendChild(cell);
            }
        }

        // 生成谜题
        function generatePuzzle() {
            path = [];
            fixedNumbers = {};
            currentNumber = 1;
            stepCount = 0;
            hintCell = null;
            
            // 生成哈密顿路径
            const totalCells = gridSize * gridSize;
            const solution = generateHamiltonianPath(totalCells);
            
            if (!solution) {
                // 如果生成失败，重试
                setTimeout(generatePuzzle, 0);
                return;
            }
            
            // 标记关键数字（1必须显示，再随机选几个）
            fixedNumbers[solution[0]] = 1; // 起点
            
            // 随机选择几个关键点作为提示（约30%）
            const keyPoints = Math.floor(maxNumber * 0.3);
            const candidates = [];
            for (let i = 1; i < maxNumber - 1; i++) {
                candidates.push(i);
            }
            shuffleArray(candidates);
            
            for (let i = 0; i < Math.min(keyPoints, candidates.length); i++) {
                const num = candidates[i];
                fixedNumbers[solution[num - 1]] = num;
            }
            
            path = [solution[0]]; // 从1开始
        }

        // 生成哈密顿路径（蛇形走法）
        function generateHamiltonianPath(totalCells) {
            const path = [];
            const visited = new Set();
            
            // 使用简单的蛇形或螺旋形路径生成
            // 先尝试随机回溯生成
            const startRow = Math.floor(Math.random() * gridSize);
            const startCol = Math.floor(Math.random() * gridSize);
            
            if (generatePathRecursive(startRow, startCol, path, visited, totalCells)) {
                return path;
            }
            
            // 如果失败，使用简单的蛇形路径
            return generateSnakePath();
        }

        function generatePathRecursive(row, col, path, visited, totalCells) {
            const idx = row * gridSize + col;
            if (visited.has(idx)) return false;
            
            visited.add(idx);
            path.push(idx);
            
            if (path.length === totalCells) {
                return true;
            }
            
            // 随机打乱方向
            const directions = shuffleArray([[0, 1], [0, -1], [1, 0], [-1, 0]]);
            
            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;
                
                if (newRow >= 0 && newRow < gridSize && newCol >= 0 && newCol < gridSize) {
                    if (generatePathRecursive(newRow, newCol, path, visited, totalCells)) {
                        return true;
                    }
                }
            }
            
            // 回溯
            visited.delete(idx);
            path.pop();
            return false;
        }

        function generateSnakePath() {
            const path = [];
            for (let row = 0; row < gridSize; row++) {
                if (row % 2 === 0) {
                    for (let col = 0; col < gridSize; col++) {
                        path.push(row * gridSize + col);
                    }
                } else {
                    for (let col = gridSize - 1; col >= 0; col--) {
                        path.push(row * gridSize + col);
                    }
                }
            }
            return path;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function onCellClick(index) {
            if (currentNumber >= maxNumber) return;
            
            const lastPos = path[path.length - 1];
            
            // 检查是否相邻
            if (!isAdjacent(lastPos, index)) {
                showToast('❌ 只能走相邻的格子！', 'error');
                return;
            }
            
            // 检查是否已经走过
            if (path.includes(index)) {
                // 如果点击的是路径上的格子，回退到那里
                const pathIndex = path.indexOf(index);
                if (pathIndex < path.length - 1) {
                    path = path.slice(0, pathIndex + 1);
                    currentNumber = path.length;
                    stepCount++;
                    hintCell = null;
                    renderGrid();
                    updateStats();
                    return;
                }
                showToast('❌ 不能重复走！', 'error');
                return;
            }
            
            // 检查是否与关键数字冲突
            if (fixedNumbers[index] && fixedNumbers[index] !== currentNumber + 1) {
                showToast(`❌ 这个格子必须是 ${fixedNumbers[index]}！`, 'error');
                return;
            }
            
            // 走这一步
            path.push(index);
            currentNumber++;
            stepCount++;
            hintCell = null;
            
            renderGrid();
            updateStats();
            
            // 检查胜利
            if (currentNumber >= maxNumber) {
                setTimeout(showVictory, 300);
            }
        }

        function isAdjacent(idx1, idx2) {
            const row1 = Math.floor(idx1 / gridSize);
            const col1 = idx1 % gridSize;
            const row2 = Math.floor(idx2 / gridSize);
            const col2 = idx2 % gridSize;
            
            const rowDiff = Math.abs(row1 - row2);
            const colDiff = Math.abs(col1 - col2);
            
            return (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
        }

        function renderGrid() {
            const cells = document.querySelectorAll('.cell');
            
            cells.forEach((cell, idx) => {
                cell.className = 'cell';
                cell.textContent = '';
                
                // 固定数字（关键提示）
                if (fixedNumbers[idx]) {
                    cell.classList.add('fixed');
                    cell.textContent = fixedNumbers[idx];
                }
                
                // 路径上的数字
                const pathIndex = path.indexOf(idx);
                if (pathIndex !== -1) {
                    cell.classList.add('path');
                    cell.textContent = pathIndex + 1;
                    
                    // 当前位置高亮
                    if (pathIndex === path.length - 1) {
                        cell.classList.add('current');
                    }
                }
                
                // 提示高亮
                if (idx === hintCell) {
                    cell.classList.add('next-hint');
                }
            });
        }

        function updateStats() {
            document.getElementById('current-num').textContent = currentNumber;
            document.getElementById('target-num').textContent = maxNumber;
            document.getElementById('step-count').textContent = stepCount;
        }

        function undo() {
            if (path.length <= 1) {
                showToast('不能撤销了！', 'error');
                return;
            }
            
            path.pop();
            currentNumber--;
            stepCount++;
            hintCell = null;
            renderGrid();
            updateStats();
            showToast('↩️ 已撤销', 'success');
        }

        function showHint() {
            if (currentNumber >= maxNumber) return;
            
            // 找到下一个应该走的位置
            const lastPos = path[path.length - 1];
            const neighbors = getNeighbors(lastPos);
            
            for (const neighbor of neighbors) {
                if (!path.includes(neighbor)) {
                    // 检查是否与关键数字冲突
                    if (fixedNumbers[neighbor] && fixedNumbers[neighbor] !== currentNumber + 1) {
                        continue;
                    }
                    hintCell = neighbor;
                    renderGrid();
                    setTimeout(() => {
                        hintCell = null;
                        renderGrid();
                    }, 1500);
                    return;
                }
            }
            
            showToast('💡 没有可走的格子了，试试撤销？', 'error');
        }

        function getNeighbors(idx) {
            const row = Math.floor(idx / gridSize);
            const col = idx % gridSize;
            const neighbors = [];
            
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;
                if (newRow >= 0 && newRow < gridSize && newCol >= 0 && newCol < gridSize) {
                    neighbors.push(newRow * gridSize + newCol);
                }
            }
            
            return shuffleArray(neighbors);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function showVictory() {
            document.getElementById('victory-target').textContent = maxNumber;
            document.getElementById('victory-steps').textContent = stepCount;
            document.getElementById('victory-modal').classList.add('show');
        }

        function nextLevel() {
            document.getElementById('victory-modal').classList.remove('show');
            // 自动升一级
            const levels = [10, 15, 20, 30];
            const currentIndex = levels.indexOf(maxNumber);
            if (currentIndex < levels.length - 1) {
                selectedLevel = levels[currentIndex + 1];
            }
            startGame();
        }

        function showLevelModal() {
            document.getElementById('level-modal').classList.add('show');
        }

        function closeLevelModal() {
            document.getElementById('level-modal').classList.remove('show');
        }

        function selectLevel(level) {
            selectedLevel = level;
            document.querySelectorAll('.level-option').forEach(opt => {
                opt.classList.toggle('selected', parseInt(opt.dataset.level) === level);
            });
        }

        function startGame() {
            maxNumber = selectedLevel;
            gridSize = maxNumber <= 20 ? 5 : 6;
            
            const labels = { 10: '1-10', 15: '1-15', 20: '1-20', 30: '1-30' };
            document.getElementById('level-badge').textContent = labels[maxNumber];
            
            closeLevelModal();
            init();
            showToast('🎮 新游戏开始！', 'success');
        }

        // 游戏导航菜单功能
        function toggleNav() {
            document.getElementById('navMenu').classList.toggle('active');
        }
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.game-nav')) {
                document.getElementById('navMenu').classList.remove('active');
            }
        });

        // 启动
        init();
    </script>
</body>
</html>
