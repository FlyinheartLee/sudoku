<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#64748b">
    <title>扫雷 - Minesweeper</title>
    <style>
        :root {
            --primary: #64748b;
            --primary-dark: #475569;
            --primary-light: #cbd5e1;
            --secondary: #94a3b8;
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #22c55e;
            --bg-dark: #1e293b;
            --bg-card: #334155;
            --text-primary: #ffffff;
            --text-secondary: #cbd5e1;
            --flag-color: #ef4444;
            --mine-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #1e293b 0%, #334155 30%, #475569 70%, #64748b 100%);
            background-attachment: fixed;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            color: var(--text-primary);
        }

        .game-nav {
            position: relative;
            z-index: 100;
        }

        .nav-toggle {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            right: 10px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 101;
        }

        .nav-menu {
            position: fixed;
            top: max(60px, calc(env(safe-area-inset-top) + 50px));
            right: 10px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
            z-index: 100;
        }

        .nav-menu.active {
            display: flex;
        }

        .nav-menu a {
            padding: 10px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .nav-menu a:hover {
            background: var(--primary-light);
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(148, 163, 184, 0.3) 0%, transparent 60%);
            animation: float 8s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.2) 0%, transparent 50%);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }

        .header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            padding-top: max(10px, env(safe-area-inset-top));
            padding-right: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(100, 116, 139, 0.4);
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #475569 0%, #64748b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .difficulty-badge {
            padding: 4px 10px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 2px 8px rgba(100, 116, 139, 0.4);
        }

        .stats-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 8px 16px;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 4px 12px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            min-width: 24px;
            text-align: center;
        }

        .stat-value.timer {
            color: #fbbf24;
        }

        .stat-value.mines {
            color: #ef4444;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            position: relative;
            z-index: 10;
        }

        .grid-container {
            background: rgba(30, 41, 59, 0.95);
            padding: 8px;
            border-radius: 12px;
            border: 2px solid rgba(100, 116, 139, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(100, 116, 139, 0.2);
            position: relative;
        }

        .game-grid {
            display: grid;
            gap: 2px;
            background: #1e293b;
            padding: 4px;
            border-radius: 6px;
        }

        .cell {
            background: linear-gradient(145deg, #64748b 0%, #475569 100%);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.7rem, 3vw, 1rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            aspect-ratio: 1;
            min-width: 24px;
            min-height: 24px;
        }

        .cell:active {
            transform: scale(0.92);
        }

        .cell.revealed {
            background: #cbd5e1;
            cursor: default;
        }

        .cell.revealed[data-count="0"] {
            background: #e2e8f0;
        }

        .cell.revealed[data-count="1"] { color: #3b82f6; }
        .cell.revealed[data-count="2"] { color: #22c55e; }
        .cell.revealed[data-count="3"] { color: #ef4444; }
        .cell.revealed[data-count="4"] { color: #7c3aed; }
        .cell.revealed[data-count="5"] { color: #dc2626; }
        .cell.revealed[data-count="6"] { color: #0891b2; }
        .cell.revealed[data-count="7"] { color: #1f2937; }
        .cell.revealed[data-count="8"] { color: #6b7280; }

        .cell.flagged {
            background: linear-gradient(145deg, #fca5a5 0%, #ef4444 100%);
        }

        .cell.flagged::after {
            content: '🚩';
            font-size: 0.9em;
        }

        .cell.mine {
            background: #ef4444 !important;
        }

        .cell.mine::after {
            content: '💣';
            font-size: 0.9em;
        }

        .cell.exploded {
            background: #dc2626 !important;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .cell.wrong-flag {
            background: #f87171;
        }

        .cell.wrong-flag::after {
            content: '❌';
        }

        .toolbar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px 12px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            flex-wrap: wrap;
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .tool-btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.4);
        }

        .tool-btn-primary:active {
            transform: scale(0.95);
        }

        .tool-btn-secondary {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary-dark);
            border: 2px solid rgba(100, 116, 139, 0.3);
        }

        .tool-btn-secondary:active {
            background: rgba(255, 255, 255, 1);
        }

        .tool-btn-secondary.active {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            border-color: #f59e0b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: linear-gradient(145deg, #ffffff 0%, #f1f5f9 100%);
            border: 2px solid rgba(100, 116, 139, 0.2);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .modal-overlay.show .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            color: #334155;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .difficulty-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .difficulty-option {
            padding: 14px 16px;
            background: rgba(203, 213, 225, 0.5);
            border: 2px solid transparent;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .difficulty-option:hover {
            background: rgba(100, 116, 139, 0.1);
            transform: translateX(4px);
        }

        .difficulty-option.selected {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            border-color: #64748b;
        }

        .difficulty-option .label {
            font-weight: 700;
            font-size: 1rem;
            color: #334155;
            display: block;
        }

        .difficulty-option .desc {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #64748b 0%, #475569 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(100, 116, 139, 0.4);
        }

        .modal-btn-secondary {
            background: rgba(203, 213, 225, 0.5);
            color: #475569;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .victory-modal, .defeat-modal {
            text-align: center;
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .final-time {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #64748b, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 8px 0;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            color: #334155;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2000;
            border: 2px solid rgba(100, 116, 139, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .toast.error {
            border-color: #ef4444;
            color: #dc2626;
        }

        .long-press-hint {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            text-align: center;
        }
    </style>
</head>

    <div class="game-nav">
        <button class="nav-toggle" onclick="toggleNav()">🎮</button>
        <div class="nav-menu" id="navMenu">

    <div class="header">

        </div>
        <div class="difficulty-badge" id="difficulty-badge">简单</div>

    <div class="stats-bar">

        </div>
        <div class="stat-card">
            <span class="stat-label">💣</span>

        </div>

    <div class="game-area">

    <div class="toolbar">
        <button class="tool-btn tool-btn-secondary" id="flag-btn" onclick="toggleFlagMode()">
            <span>🚩</span> 标记
        </button>
        <button class="tool-btn tool-btn-primary" onclick="showDifficultyModal()">
            <span>🎮</span> 新游戏
        </button>
    </div>

    <!-- 难度选择 -->
    <div class="modal-overlay" id="difficulty-modal">
        <div class="modal">
            <h2>选择难度</h2>
            <div class="difficulty-options">
                <div class="difficulty-option selected" data-diff="easy" onclick="selectDifficulty('easy')">
                    <span class="label">🌱 简单</span>
                    <span class="desc">9×9 格子，10颗雷</span>
                </div>
                <div class="difficulty-option" data-diff="medium" onclick="selectDifficulty('medium')">
                    <span class="label">🌿 中级</span>
                    <span class="desc">16×16 格子，40颗雷</span>
                </div>
                <div class="difficulty-option" data-diff="hard" onclick="selectDifficulty('hard')">
                    <span class="label">🔥 困难</span>
                    <span class="desc">30×16 格子，99颗雷</span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeDifficultyModal()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="startNewGame()">开始</button>
            </div>
        </div>
    </div>

    <!-- 胜利弹窗 -->
    <div class="modal-overlay" id="victory-modal">
        <div class="modal victory-modal">
            <div class="modal-icon">🎉</div>
            <h2>恭喜通关！</h2>
            <div class="final-time" id="victory-time">000</div>
            <p style="color: #64748b; font-size: 0.9rem;">你成功避开了所有地雷！</p>
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="modal-btn modal-btn-primary" onclick="closeVictory(); startNewGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 失败弹窗 -->
    <div class="modal-overlay" id="defeat-modal">
        <div class="modal defeat-modal">
            <div class="modal-icon">💥</div>
            <h2>游戏结束！</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin: 10px 0;">你踩到了地雷...</p>
            <div class="modal-actions" style="margin-top: 20px;">
                <button class="modal-btn modal-btn-primary" onclick="closeDefeat(); startNewGame()">再试一次</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const DIFFICULTIES = {
            easy: { rows: 9, cols: 9, mines: 10, name: '简单' },
            medium: { rows: 16, cols: 16, mines: 40, name: '中级' },
            hard: { rows: 16, cols: 30, mines: 99, name: '困难' }
        };

        let currentDiff = 'easy';
        let grid = [];
        let revealed = [];
        let flagged = [];
        let mines = [];
        let gameOver = false;
        let timerInterval = null;
        let seconds = 0;
        let flagMode = false;
        let firstClick = true;
        let longPressTimer = null;

        function init() {
            newGame();
        }

        function newGame() {
            const diff = DIFFICULTIES[currentDiff];
            
            // 重置状态
            grid = Array(diff.rows).fill().map(() => Array(diff.cols).fill(0));
            revealed = Array(diff.rows).fill().map(() => Array(diff.cols).fill(false));
            flagged = Array(diff.rows).fill().map(() => Array(diff.cols).fill(false));
            mines = [];
            gameOver = false;
            firstClick = true;
            seconds = 0;
            
            clearInterval(timerInterval);
            updateTimer();
            updateMineCount();
            
            createGrid();
        }

        function createGrid() {
            const gridEl = document.getElementById('grid');
            const diff = DIFFICULTIES[currentDiff];
            
            gridEl.innerHTML = '';
            gridEl.style.gridTemplateColumns = `repeat(${diff.cols}, 1fr)`;
            
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    // 触摸事件
                    cell.addEventListener('click', () => onCellClick(r, c));
                    cell.addEventListener('touchstart', (e) => {
                        longPressTimer = setTimeout(() => {
                            e.preventDefault();
                            toggleFlag(r, c);
                        }, 500);
                    }, { passive: true });
                    cell.addEventListener('touchend', () => clearTimeout(longPressTimer));
                    cell.addEventListener('touchmove', () => clearTimeout(longPressTimer));
                    
                    // 鼠标右键标记
                    cell.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        toggleFlag(r, c);
                    });
                    
                    gridEl.appendChild(cell);
                }
            }
        }

        function placeMines(firstRow, firstCol) {
            const diff = DIFFICULTIES[currentDiff];
            mines = [];
            
            let placed = 0;
            while (placed < diff.mines) {
                const r = Math.floor(Math.random() * diff.rows);
                const c = Math.floor(Math.random() * diff.cols);
                
                // 避免在第一次点击位置及周围放置地雷
                if (Math.abs(r - firstRow) <= 1 && Math.abs(c - firstCol) <= 1) continue;
                if (grid[r][c] === -1) continue;
                
                grid[r][c] = -1;
                mines.push({r, c});
                placed++;
            }
            
            // 计算数字
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    if (grid[r][c] === -1) continue;
                    
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < diff.rows && nc >= 0 && nc < diff.cols && grid[nr][nc] === -1) {
                                count++;
                            }
                        }
                    }
                    grid[r][c] = count;
                }
            }
        }

        function onCellClick(r, c) {
            if (gameOver) return;
            if (flagged[r][c]) return;
            if (revealed[r][c]) return;
            
            if (flagMode) {
                toggleFlag(r, c);
                return;
            }
            
            // 第一次点击时放置地雷
            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                timerInterval = setInterval(updateTimer, 1000);
            }
            
            revealCell(r, c);
            renderGrid();
            
            if (grid[r][c] === -1) {
                gameOver = true;
                clearInterval(timerInterval);
                revealAllMines();
                setTimeout(showDefeat, 500);
            } else if (checkVictory()) {
                gameOver = true;
                clearInterval(timerInterval);
                setTimeout(showVictory, 300);
            }
        }

        function revealCell(r, c) {
            const diff = DIFFICULTIES[currentDiff];
            if (r < 0 || r >= diff.rows || c < 0 || c >= diff.cols) return;
            if (revealed[r][c]) return;
            if (flagged[r][c]) return;
            
            revealed[r][c] = true;
            
            // 如果是0，自动展开周围
            if (grid[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        revealCell(r + dr, c + dc);
                    }
                }
            }
        }

        function toggleFlag(r, c) {
            if (gameOver) return;
            if (revealed[r][c]) return;
            
            flagged[r][c] = !flagged[r][c];
            renderGrid();
            updateMineCount();
        }

        function renderGrid() {
            const diff = DIFFICULTIES[currentDiff];
            const cells = document.querySelectorAll('.cell');
            
            cells.forEach((cell, idx) => {
                const r = Math.floor(idx / diff.cols);
                const c = idx % diff.cols;
                
                cell.className = 'cell';
                cell.textContent = '';
                cell.removeAttribute('data-count');
                
                if (revealed[r][c]) {
                    cell.classList.add('revealed');
                    if (grid[r][c] === -1) {
                        cell.classList.add('mine');
                    } else if (grid[r][c] > 0) {
                        cell.textContent = grid[r][c];
                        cell.setAttribute('data-count', grid[r][c]);
                    }
                } else if (flagged[r][c]) {
                    cell.classList.add('flagged');
                }
            });
        }

        function revealAllMines() {
            const diff = DIFFICULTIES[currentDiff];
            mines.forEach(m => {
                revealed[m.r][m.c] = true;
            });
            renderGrid();
        }

        function checkVictory() {
            const diff = DIFFICULTIES[currentDiff];
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    if (grid[r][c] !== -1 && !revealed[r][c]) return false;
                }
            }
            return true;
        }

        function updateTimer() {
            document.getElementById('timer').textContent = seconds.toString().padStart(3, '0');
            seconds++;
        }

        function updateMineCount() {
            const diff = DIFFICULTIES[currentDiff];
            let flagCount = 0;
            for (let r = 0; r < diff.rows; r++) {
                for (let c = 0; c < diff.cols; c++) {
                    if (flagged[r][c]) flagCount++;
                }
            }
            document.getElementById('mine-count').textContent = diff.mines - flagCount;
        }

        function toggleFlagMode() {
            flagMode = !flagMode;
            const btn = document.getElementById('flag-btn');
            btn.classList.toggle('active', flagMode);
        }

        function showDifficultyModal() {
            document.getElementById('difficulty-modal').classList.add('show');
        }

        function closeDifficultyModal() {
            document.getElementById('difficulty-modal').classList.remove('show');
        }

        function selectDifficulty(diff) {
            currentDiff = diff;
            document.querySelectorAll('.difficulty-option').forEach(opt => {
                opt.classList.toggle('selected', opt.dataset.diff === diff);
            });
        }

        function startNewGame() {
            closeDifficultyModal();
            closeVictory();
            closeDefeat();
            document.getElementById('difficulty-badge').textContent = DIFFICULTIES[currentDiff].name;
            newGame();
            showToast('🎮 新游戏开始！', 'success');
        }

        function showVictory() {
            document.getElementById('victory-time').textContent = (seconds - 1).toString().padStart(3, '0');
            document.getElementById('victory-modal').classList.add('show');
        }

        function closeVictory() {
            document.getElementById('victory-modal').classList.remove('show');
        }

        function showDefeat() {
            document.getElementById('defeat-modal').classList.add('show');
        }

        function closeDefeat() {
            document.getElementById('defeat-modal').classList.remove('show');
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function toggleNav() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.game-nav')) {
                document.getElementById('navMenu').classList.remove('active');
            }
        });

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        init();
    </script>
</body>
</html>
