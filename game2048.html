<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#8b5cf6">
    <title>2048 - 经典益智游戏</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #ddd6fe;
            --secondary: #a78bfa;
            --accent: #f59e0b;
            --bg-dark: #4c1d95;
            --bg-card: #5b21b6;
            --text-primary: #ffffff;
            --text-secondary: #e9d5ff;
            --success: #10b981;
            --tile-2: #e0e7ff;
            --tile-4: #c7d2fe;
            --tile-8: #a5b4fc;
            --tile-16: #818cf8;
            --tile-32: #6366f1;
            --tile-64: #4f46e5;
            --tile-128: #4338ca;
            --tile-256: #3730a3;
            --tile-512: #312e81;
            --tile-1024: #1e1b4b;
            --tile-2048: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #4c1d95 0%, #5b21b6 30%, #7c3aed 70%, #8b5cf6 100%);
            background-attachment: fixed;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            width: 100%;
            color: var(--text-primary);
        }

        .game-nav {
            position: relative;
            z-index: 100;
        }

        .nav-toggle {
            position: fixed;
            top: max(10px, env(safe-area-inset-top));
            right: 10px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 101;
        }

        .nav-menu {
            position: fixed;
            top: max(60px, calc(env(safe-area-inset-top) + 50px));
            right: 10px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            gap: 8px;
            min-width: 180px;
            z-index: 100;
        }

        .nav-menu.active {
            display: flex;
        }

        .nav-menu a {
            padding: 10px 16px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .nav-menu a:hover {
            background: var(--primary-light);
        }

        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.4) 0%, transparent 60%);
            animation: float 8s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -20%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.3) 0%, transparent 50%);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-20px, -20px); }
        }

        .header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            padding-right: 60px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 16px;
        }

        .stat-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 16px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px 16px;
            position: relative;
            z-index: 10;
        }

        .grid-container {
            background: rgba(30, 27, 75, 0.95);
            padding: 12px;
            border-radius: 16px;
            border: 2px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 60px rgba(139, 92, 246, 0.3);
            position: relative;
            width: 100%;
            max-width: min(92vw, 400px);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 8px;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.2rem, 6vw, 1.8rem);
            font-weight: 700;
            color: white;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .cell[data-value="2"] { background: var(--tile-2); color: #3730a3; }
        .cell[data-value="4"] { background: var(--tile-4); color: #3730a3; }
        .cell[data-value="8"] { background: var(--tile-8); color: white; }
        .cell[data-value="16"] { background: var(--tile-16); color: white; }
        .cell[data-value="32"] { background: var(--tile-32); color: white; }
        .cell[data-value="64"] { background: var(--tile-64); color: white; }
        .cell[data-value="128"] { background: var(--tile-128); color: white; box-shadow: 0 0 15px rgba(67, 56, 202, 0.5); }
        .cell[data-value="256"] { background: var(--tile-256); color: white; box-shadow: 0 0 15px rgba(55, 48, 163, 0.5); }
        .cell[data-value="512"] { background: var(--tile-512); color: white; box-shadow: 0 0 20px rgba(49, 46, 129, 0.6); }
        .cell[data-value="1024"] { background: var(--tile-1024); color: white; box-shadow: 0 0 25px rgba(30, 27, 75, 0.7); }
        .cell[data-value="2048"] { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: white; box-shadow: 0 0 30px rgba(245, 158, 11, 0.8); animation: glow 2s ease-in-out infinite; }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(245, 158, 11, 0.8); }
            50% { box-shadow: 0 0 50px rgba(245, 158, 11, 1); }
        }

        .cell.new-tile {
            animation: pop 0.3s ease;
        }

        .cell.merged {
            animation: merge 0.25s ease;
        }

        @keyframes pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes merge {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .toolbar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .tool-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .tool-btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
        }

        .tool-btn-primary:active {
            transform: scale(0.95);
        }

        .tool-btn-secondary {
            background: rgba(255, 255, 255, 0.9);
            color: var(--primary-dark);
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .tool-btn-secondary:active {
            background: rgba(255, 255, 255, 1);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: linear-gradient(145deg, #ffffff 0%, #f5f3ff 100%);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 340px;
            transform: translateY(30px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .modal-overlay.show .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            color: #5b21b6;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .modal p {
            color: #6d28d9;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.5);
        }

        .modal-btn-secondary {
            background: rgba(221, 214, 254, 0.5);
            color: #5b21b6;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .victory-modal {
            text-align: center;
        }

        .victory-icon {
            font-size: 5rem;
            margin-bottom: 16px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .final-score {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #8b5cf6, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.98);
            color: #5b21b6;
            padding: 16px 28px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 2000;
            border: 2px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .toast.error {
            border-color: #ef4444;
            color: #dc2626;
        }

        /* 触摸滑动提示 */
        .swipe-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="game-nav">
        <button class="nav-toggle" onclick="toggleNav()">🎮</button>
        <div class="nav-menu" id="navMenu">
            <a href="sudoku-h5.html">🧩 数独</a>
            <a href="number-maze.html">🔢 数字迷宫</a>
            <a href="skyscraper.html">🏢 摩天楼</a>
            <a href="game2048.html">🔢 2048</a>
            <a href="klotski.html">🧩 华容道</a>
            <a href="minesweeper.html">💣 扫雷</a>
            <a href="pipe.html">🔧 接水管</a>
            <a href="memory.html">🃏 记忆翻牌</a>
            <a href="sokoban.html">📦 推箱子</a>
            <a href="hashi.html">🌉 数桥</a>
        </div>
    </div>

    <div class="bg-decoration"></div>

    <div class="header">
        <div class="logo">
            <div class="logo-icon">🔢</div>
            <div class="logo-text">2048</div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card">
            <span class="stat-label">分数</span>
            <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">最高分</span>
            <span class="stat-value" id="best-score">0</span>
        </div>
    </div>

    <div class="game-area">
        <div class="grid-container">
            <div class="game-grid" id="grid"></div>
        </div>
        <div class="swipe-hint">👆 滑动屏幕或使用方向键移动</div>
    </div>

    <div class="toolbar">
        <button class="tool-btn tool-btn-secondary" onclick="undo()">
            <span>↩️</span> 撤销
        </button>
        <button class="tool-btn tool-btn-primary" onclick="newGame()">
            <span>🎮</span> 新游戏
        </button>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="gameover-modal">
        <div class="modal">
            <h2>游戏结束！</h2>
            <p>无法继续移动了</p>
            <div class="final-score" id="final-score">0</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-primary" onclick="closeModal(); newGame()">再玩一次</button>
            </div>
        </div>
    </div>

    <!-- 胜利弹窗 -->
    <div class="modal-overlay" id="victory-modal">
        <div class="modal victory-modal">
            <div class="victory-icon">🎉</div>
            <h2>恭喜达成 2048！</h2>
            <p>你太厉害了！</p>
            <div class="final-score" id="victory-score">0</div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-primary" onclick="closeVictory(); continueGame()">继续挑战</button>
                <button class="modal-btn modal-btn-secondary" onclick="closeVictory(); newGame()">新游戏</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let grid = Array(4).fill().map(() => Array(4).fill(0));
        let score = 0;
        let bestScore = localStorage.getItem('2048-best') || 0;
        let history = [];
        let hasWon = false;
        let touchStartX = 0;
        let touchStartY = 0;

        function init() {
            document.getElementById('best-score').textContent = bestScore;
            createGrid();
            newGame();
            setupTouch();
            setupKeyboard();
        }

        function createGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                gridEl.appendChild(cell);
            }
        }

        function newGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            history = [];
            updateScore();
            addRandomTile();
            addRandomTile();
            renderGrid();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            
            if (emptyCells.length > 0) {
                const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
                return {r, c, value: grid[r][c]};
            }
            return null;
        }

        function renderGrid() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`cell-${r * 4 + c}`);
                    const value = grid[r][c];
                    cell.textContent = value || '';
                    cell.setAttribute('data-value', value);
                    cell.classList.remove('new-tile', 'merged');
                }
            }
        }

        function animateTile(r, c, type) {
            const cell = document.getElementById(`cell-${r * 4 + c}`);
            cell.classList.add(type);
            setTimeout(() => cell.classList.remove(type), 300);
        }

        function move(direction) {
            saveState();
            
            let moved = false;
            const newGrid = Array(4).fill().map(() => Array(4).fill(0));
            
            if (direction === 'left') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = 0; i < row.length - 1; i++) {
                        if (row[i] === row[i + 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row[i + 1] = 0;
                            if (row[i] === 2048 && !hasWon) {
                                hasWon = true;
                                setTimeout(showVictory, 300);
                            }
                        }
                    }
                    row = row.filter(v => v !== 0);
                    while (row.length < 4) row.push(0);
                    for (let c = 0; c < 4; c++) {
                        if (newGrid[r][c] !== row[c]) moved = true;
                        newGrid[r][c] = row[c];
                    }
                }
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r].filter(v => v !== 0);
                    for (let i = row.length - 1; i > 0; i--) {
                        if (row[i] === row[i - 1]) {
                            row[i] *= 2;
                            score += row[i];
                            row[i - 1] = 0;
                            if (row[i] === 2048 && !hasWon) {
                                hasWon = true;
                                setTimeout(showVictory, 300);
                            }
                        }
                    }
                    row = row.filter(v => v !== 0);
                    while (row.length < 4) row.unshift(0);
                    for (let c = 0; c < 4; c++) {
                        if (newGrid[r][c] !== row[c]) moved = true;
                        newGrid[r][c] = row[c];
                    }
                }
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) if (grid[r][c] !== 0) col.push(grid[r][c]);
                    for (let i = 0; i < col.length - 1; i++) {
                        if (col[i] === col[i + 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col[i + 1] = 0;
                            if (col[i] === 2048 && !hasWon) {
                                hasWon = true;
                                setTimeout(showVictory, 300);
                            }
                        }
                    }
                    col = col.filter(v => v !== 0);
                    while (col.length < 4) col.push(0);
                    for (let r = 0; r < 4; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    let col = [];
                    for (let r = 0; r < 4; r++) if (grid[r][c] !== 0) col.push(grid[r][c]);
                    for (let i = col.length - 1; i > 0; i--) {
                        if (col[i] === col[i - 1]) {
                            col[i] *= 2;
                            score += col[i];
                            col[i - 1] = 0;
                            if (col[i] === 2048 && !hasWon) {
                                hasWon = true;
                                setTimeout(showVictory, 300);
                            }
                        }
                    }
                    col = col.filter(v => v !== 0);
                    while (col.length < 4) col.unshift(0);
                    for (let r = 0; r < 4; r++) {
                        if (newGrid[r][c] !== col[r]) moved = true;
                        newGrid[r][c] = col[r];
                    }
                }
            }
            
            if (moved) {
                grid = newGrid;
                const newTile = addRandomTile();
                renderGrid();
                if (newTile) animateTile(newTile.r, newTile.c, 'new-tile');
                updateScore();
                
                if (isGameOver()) {
                    setTimeout(showGameOver, 500);
                }
            } else {
                history.pop();
            }
        }

        function saveState() {
            history.push({
                grid: grid.map(row => [...row]),
                score: score
            });
            if (history.length > 10) history.shift();
        }

        function undo() {
            if (history.length === 0) {
                showToast('无法撤销', 'error');
                return;
            }
            
            const state = history.pop();
            grid = state.grid;
            score = state.score;
            renderGrid();
            updateScore();
            showToast('已撤销', 'success');
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048-best', bestScore);
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function isGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        function isVictory() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 2048) return true;
                }
            }
            return false;
        }

        function showGameOver() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-modal').classList.add('show');
        }

        function showVictory() {
            document.getElementById('victory-score').textContent = score;
            document.getElementById('victory-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('gameover-modal').classList.remove('show');
        }

        function closeVictory() {
            document.getElementById('victory-modal').classList.remove('show');
        }

        function continueGame() {
            // 继续游戏，不做任何操作
        }

        function setupTouch() {
            const gameArea = document.querySelector('.game-area');
            
            gameArea.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            
            gameArea.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                const dx = touchEndX - touchStartX;
                const dy = touchEndY - touchStartY;
                
                const minSwipe = 50;
                
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                    e.preventDefault();
                    if (dx > 0) move('right');
                    else move('left');
                } else if (Math.abs(dy) > minSwipe) {
                    e.preventDefault();
                    if (dy > 0) move('down');
                    else move('up');
                }
            }, { passive: false });
        }

        function setupKeyboard() {
            document.addEventListener('keydown', (e) => {
                switch(e.key) {
                    case 'ArrowLeft': move('left'); break;
                    case 'ArrowRight': move('right'); break;
                    case 'ArrowUp': move('up'); break;
                    case 'ArrowDown': move('down'); break;
                }
            });
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function toggleNav() {
            document.getElementById('navMenu').classList.toggle('active');
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.game-nav')) {
                document.getElementById('navMenu').classList.remove('active');
            }
        });

        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        init();
    </script>
</body>
</html>
